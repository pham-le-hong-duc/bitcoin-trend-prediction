name: bitcoin-trend-prod

x-app-image: &app-image
  image: ${APP_IMAGE}
  env_file:
    - .env

x-pipeline-env: &pipeline-env
  PYTHONUNBUFFERED: "1"
  TZ: ${TZ}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MINIO_SECURE: "false"
  TIMESCALE_HOST: timescaledb
  TIMESCALE_PORT: "5432"
  TIMESCALE_DB: ${TIMESCALE_DB}
  TIMESCALE_USER: ${TIMESCALE_USER}
  TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}

x-airflow-env: &airflow-env
  <<: *pipeline-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/${AIRFLOW_DB_NAME}
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  PYTHONPATH: /opt/airflow:/opt/airflow/src
  PYTHONWARNINGS: ignore::DeprecationWarning
  AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
  AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
  AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
  AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
  AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}

services:
  caddy:
    image: caddy:2
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - grafana
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - 0.0.0.0:9092
      - --advertise-kafka-addr
      - redpanda:9092
    environment:
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${REDPANDA_LOCAL_PORT}:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    profiles: ["admin"]
    environment:
      KAFKA_BROKERS: redpanda:9092
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${REDPANDA_CONSOLE_LOCAL_PORT}:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${TIMESCALE_DB}
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${TIMESCALE_LOCAL_PORT}:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER} -d ${TIMESCALE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      CONSOLE_MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      CONSOLE_MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${MINIO_API_LOCAL_PORT}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_LOCAL_PORT}:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      TZ: ${TZ}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${PUBLIC_DOMAIN}
      GF_INSTALL_PLUGINS: magnesium-wordcloud-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ../refer/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../refer/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  redpanda-init:
    <<: *app-image
    command: python -m src.init.redpanda
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"

  minio-init:
    <<: *app-image
    command: python -m src.init.minio
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  timescaledb-init:
    <<: *app-image
    command: python -m src.init.timescaledb
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  airflow-init:
    <<: *app-image
    working_dir: /opt/airflow
    command: python -m src.init.airflow
    environment:
      <<: *airflow-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *app-image
    working_dir: /opt/airflow
    command: airflow webserver
    environment:
      <<: *airflow-env
    ports:
      - "127.0.0.1:${AIRFLOW_LOCAL_PORT}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redpanda-init:
        condition: service_completed_successfully
      timescaledb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *app-image
    working_dir: /opt/airflow
    command: airflow scheduler
    environment:
      <<: *airflow-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redpanda-init:
        condition: service_completed_successfully
      timescaledb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-consumer-minio-binance:
    <<: *app-image
    profiles: ["realtime"]
    command: python -m src.streaming.consumer.minio.binance.run
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
    depends_on:
      minio-init:
        condition: service_completed_successfully
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-producer-binance:
    <<: *app-image
    profiles: ["realtime"]
    command: python -m src.streaming.producer.binance.run
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
      SYMBOL: ${SYMBOL}
      BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-consumer-timescaledb-dashboard:
    <<: *app-image
    profiles: ["realtime"]
    command: python -m src.streaming.consumer.timescaledb.dashboard.run
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
      TIMESCALEDB_KAFKA_AUTO_OFFSET_RESET: earliest
      TIMESCALEDB_KAFKA_MIN_WARMUP_MESSAGES: "500"
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      timescaledb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-consumer-minio-reddit:
    <<: *app-image
    profiles: ["reddit"]
    command: python -m src.streaming.consumer.minio.reddit.run
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
    depends_on:
      minio-init:
        condition: service_completed_successfully
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-producer-reddit:
    <<: *app-image
    profiles: ["reddit"]
    command: python -m src.streaming.producer.reddit.run
    environment:
      <<: *pipeline-env
      PYTHONPATH: /app
      BOOTSTRAP_SERVERS: redpanda:9092
      REDDIT_PROXY: ${REDDIT_PROXY:-}
      REDDIT_MODEL_BATCH_SIZE: ${REDDIT_MODEL_BATCH_SIZE:-32}
      REDDIT_MAX_SUBMISSIONS_PER_RUN: ${REDDIT_MAX_SUBMISSIONS_PER_RUN:-50}
      REDDIT_MAX_COMMENT_SUBMISSIONS_PER_RUN: ${REDDIT_MAX_COMMENT_SUBMISSIONS_PER_RUN:-20}
      REDDIT_MAX_COMMENTS_PER_RUN: ${REDDIT_MAX_COMMENTS_PER_RUN:-1000}
      REDDIT_MAX_TRACKING_LOOPS_PER_RUN: ${REDDIT_MAX_TRACKING_LOOPS_PER_RUN:-1}
    volumes:
      - ${REDDIT_MODEL_DIR}:/app/src/model:ro
      - ${REDDIT_COOKIES_DIR}:/app/src/streaming/producer/reddit/cookies:ro
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  minio-seed:
    image: minio/mc:latest
    profiles: ["seed"]
    env_file:
      - .env
    volumes:
      - ${SEED_DATA_DIR}:/seed-data:ro
    entrypoint:
      - /bin/sh
      - -c
      - >
        set -e;
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done;
        mc mb -p local/binance || true;
        mc mb -p local/reddit || true;
        if [ -d /seed-data/binance ]; then mc mirror --overwrite /seed-data/binance local/binance; fi;
        if [ -d /seed-data/reddit ]; then mc mirror --overwrite /seed-data/reddit local/reddit; fi
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

volumes:
  caddy-data:
  caddy-config:
  grafana-data:
  minio-data:
  postgres-data:
  redpanda-data:
  timescaledb-data:
