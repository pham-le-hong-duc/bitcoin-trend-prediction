services:
  streaming-producer-binance:
    image: thesis-pipeline:latest
    container_name: "streaming.producer.binance"
    command: python -m src.streaming.producer.binance.run
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      SYMBOL: BTCUSDT
      BOOTSTRAP_SERVERS: redpanda:9092
      TZ: UTC
    volumes:
      - ../src:/app/src
    restart: unless-stopped

  streaming-producer-reddit:
    image: thesis-pipeline:latest
    container_name: "streaming.producer.reddit"
    command: python -m src.streaming.producer.reddit.run
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      TZ: UTC
      REDDIT_MODEL_BATCH_SIZE: 32
      REDDIT_MAX_SUBMISSIONS_PER_RUN: 50
      REDDIT_MAX_COMMENT_SUBMISSIONS_PER_RUN: 20
      REDDIT_MAX_COMMENTS_PER_RUN: 1000
      REDDIT_MAX_TRACKING_LOOPS_PER_RUN: 1
    volumes:
      - ../src:/app/src
    restart: unless-stopped

networks:
  default:
    name: streaming
    driver: bridge
    external: true
