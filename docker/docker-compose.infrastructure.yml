services:
  # ========================================
  # INFRASTRUCTURE: STREAMING
  # ========================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr redpanda:9092
    environment:
      TZ: UTC
    ports:
      - "19092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
      TZ: UTC
    ports:
      - "8081:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # ========================================
  # INFRASTRUCTURE: STORAGE
  # ========================================
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with Airflow's postgres
    volumes:
      - ../data/timescaledb:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: base
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d base"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      TZ: UTC
    volumes:
      - ../data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # INFRASTRUCTURE: ORCHESTRATION
  # ========================================
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
      - TZ=UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-webserver:
    image: thesis-pipeline:latest
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      - "8082:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__WEBSERVER__SECRET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
      - PYTHONWARNINGS=ignore::DeprecationWarning
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_DB=base
      - TIMESCALE_USER=admin
      - TIMESCALE_PASSWORD=password
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ./requirements.txt:/opt/airflow/requirements.txt
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    image: thesis-pipeline:latest
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__WEBSERVER__SECRET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - PYTHONPATH=/opt/airflow:/opt/airflow/src
      - PYTHONWARNINGS=ignore::DeprecationWarning
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_DB=base
      - TIMESCALE_USER=admin
      - TIMESCALE_PASSWORD=password
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ./requirements.txt:/opt/airflow/requirements.txt
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ========================================
  # INITIALIZATION CONTAINERS
  # ========================================
  redpanda-init:
    image: thesis-pipeline:latest
    container_name: redpanda-init
    command: python -m src.init.redpanda
    environment:
      - TZ=UTC
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"

  minio-init:
    image: thesis-pipeline:latest
    container_name: minio-init
    command: python -m src.init.minio
    environment:
      - TZ=UTC
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  timescaledb-init:
    image: thesis-pipeline:latest
    container_name: timescaledb-init
    command: python -m src.init.timescaledb
    environment:
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_DB=base
      - TIMESCALE_USER=admin
      - TIMESCALE_PASSWORD=password
      - TZ=UTC
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  airflow-init:
    image: thesis-pipeline:latest
    container_name: airflow-init
    command: python -m src.init.airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - TZ=UTC
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  redpanda_data:
  postgres_data:

networks:
  default:
    name: streaming
    driver: bridge
