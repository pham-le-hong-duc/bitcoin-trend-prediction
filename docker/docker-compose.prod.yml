services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.4
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 768M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:8082
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ${DATA_ROOT}/redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.4
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${REDPANDA_CONSOLE_LOCAL_PORT:-8081}:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.19.3-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: ${TIMESCALE_DB}
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${TIMESCALE_LOCAL_PORT:-5433}:5432"
    volumes:
      - ${DATA_ROOT}/timescaledb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER} -d ${TIMESCALE_DB}"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-03T14-56-28Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      CONSOLE_MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      CONSOLE_MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${MINIO_API_LOCAL_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_LOCAL_PORT:-9001}:9001"
    volumes:
      - ${DATA_ROOT}/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: https://${PUBLIC_DOMAIN}
      GF_INSTALL_PLUGINS: magnesium-wordcloud-panel
      TZ: ${TZ:-UTC}
    volumes:
      - ${DATA_ROOT}/grafana:/var/lib/grafana
      - ../refer/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../refer/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2.9.1
    container_name: caddy
    environment:
      DOMAIN: ${PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_ROOT}/caddy_data:/data
      - ${DATA_ROOT}/caddy_config:/config
    depends_on:
      grafana:
        condition: service_started
    restart: unless-stopped

  redpanda-init:
    image: ${APP_IMAGE}
    container_name: redpanda-init
    command: python -m src.init.redpanda
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      TZ: ${TZ:-UTC}
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"

  minio-init:
    image: ${APP_IMAGE}
    container_name: minio-init
    command: python -m src.init.minio
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      TZ: ${TZ:-UTC}
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  timescaledb-init:
    image: ${APP_IMAGE}
    container_name: timescaledb-init
    command: python -m src.init.timescaledb
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: ${TIMESCALE_DB}
      TIMESCALE_USER: ${TIMESCALE_USER}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
      TZ: ${TZ:-UTC}
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  streaming-consumer-minio-binance:
    image: ${APP_IMAGE}
    container_name: streaming.consumer.minio.binance
    command: python -m src.streaming.consumer.minio.binance.run
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      BOOTSTRAP_SERVERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      TZ: ${TZ:-UTC}
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-consumer-timescaledb-dashboard:
    image: ${APP_IMAGE}
    container_name: streaming.consumer.timescaledb.dashboard
    command: python -m src.streaming.consumer.timescaledb.dashboard.run
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      BOOTSTRAP_SERVERS: redpanda:9092
      TIMESCALEDB_KAFKA_AUTO_OFFSET_RESET: ${TIMESCALEDB_KAFKA_AUTO_OFFSET_RESET:-latest}
      TIMESCALEDB_KAFKA_MIN_WARMUP_MESSAGES: ${TIMESCALEDB_KAFKA_MIN_WARMUP_MESSAGES:-500}
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: ${TIMESCALE_DB}
      TIMESCALE_USER: ${TIMESCALE_USER}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
      TZ: ${TZ:-UTC}
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      timescaledb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-producer-binance:
    image: ${APP_IMAGE}
    container_name: streaming.producer.binance
    command: python -m src.streaming.producer.binance.run
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      SYMBOL: ${SYMBOL:-BTCUSDT}
      BOOTSTRAP_SERVERS: redpanda:9092
      TZ: ${TZ:-UTC}
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    profiles: ["airflow"]
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      TZ: ${TZ:-UTC}
    volumes:
      - ${DATA_ROOT}/airflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    profiles: ["airflow"]
    image: ${APP_IMAGE}
    container_name: airflow-init
    command: python -m src.init.airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      PYTHONPATH: /app
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    profiles: ["airflow"]
    image: ${APP_IMAGE}
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      - "127.0.0.1:${AIRFLOW_LOCAL_PORT:-8082}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      PYTHONPATH: /app
      PYTHONWARNINGS: ignore::DeprecationWarning
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: ${TIMESCALE_DB}
      TIMESCALE_USER: ${TIMESCALE_USER}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-UTC}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      timescaledb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    profiles: ["airflow"]
    image: ${APP_IMAGE}
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      PYTHONPATH: /app
      PYTHONWARNINGS: ignore::DeprecationWarning
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: ${TIMESCALE_DB}
      TIMESCALE_USER: ${TIMESCALE_USER}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-UTC}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      timescaledb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  minio-seed:
    profiles: ["seed"]
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: minio-seed
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
        if [ -d /seed-data/binance ]; then
          mc mirror --overwrite /seed-data/binance local/binance
        fi
        if [ -d /seed-data/reddit ]; then
          mc mirror --overwrite /seed-data/reddit local/reddit
        fi
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${SEED_DATA_DIR:-./seed-data}:/seed-data:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: "no"

  streaming-consumer-minio-reddit:
    profiles: ["reddit"]
    image: ${APP_IMAGE}
    container_name: streaming.consumer.minio.reddit
    command: python -m src.streaming.consumer.minio.reddit.run
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      BOOTSTRAP_SERVERS: redpanda:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      TZ: ${TZ:-UTC}
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streaming-producer-reddit:
    profiles: ["reddit"]
    image: ${APP_IMAGE}
    container_name: streaming.producer.reddit
    command: python -m src.streaming.producer.reddit.run
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      BOOTSTRAP_SERVERS: redpanda:9092
      REDDIT_PROXY: ${REDDIT_PROXY:-}
      TZ: ${TZ:-UTC}
    volumes:
      - ${REDDIT_MODEL_DIR}:/app/src/model:ro
      - ${REDDIT_COOKIES_DIR}:/app/src/streaming/producer/reddit/cookies:ro
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  default:
    name: bitcoin-streaming
